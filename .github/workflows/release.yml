name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      # Stage the npm tarball into dist/ — publish_repo.sh attaches dist/* to the release.
      - name: Pack tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attestload-dist
          path: dist/*

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    # Optional npm publish — only runs when an NPM_TOKEN secret is configured.
    if: ${{ github.repository_owner == 'SuperMarioYL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN not set — skipping publish."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
