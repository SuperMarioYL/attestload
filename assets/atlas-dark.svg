<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="架构：attest → SBOM/manifest → sign → verify → policy/loader-guard → allowlist">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/>
    </marker>
    <marker id="ah-block-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#FF6B6B"/>
    </marker>
    <marker id="ah-pass-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2DC79A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="360" rx="16" fill="#1D1D1F"/>

  <!-- swimlane captions -->
  <text x="40" y="40" font-size="13" font-weight="700" fill="#FBBF24" letter-spacing="0.5">PRODUCE · 作者签名</text>
  <text x="40" y="214" font-size="13" font-weight="700" fill="#FF8585" letter-spacing="0.5">CONSUME · 加载前校验</text>
  <line x1="40" y1="188" x2="840" y2="188" stroke="#46322C" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- ===== PRODUCE lane: attest → sbom/manifest → sign ===== -->
  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="205" y1="108" x2="300" y2="108" marker-end="url(#ah-d)"/>
    <line x1="505" y1="108" x2="600" y2="108" marker-end="url(#ah-d)"/>
  </g>

  <!-- attest -->
  <rect x="40" y="68" width="165" height="80" rx="15" fill="#FBBF24" fill-opacity="0.16" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="122" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#FCD34D">attest &lt;dir&gt;</text>
  <text x="122" y="122" text-anchor="middle" font-size="11" fill="#A1A1A8">扫描 Skill / MCP 目录</text>

  <!-- sbom + manifest (stacked group) -->
  <rect x="300" y="60" width="205" height="96" rx="15" fill="#FF8A4C" fill-opacity="0.16" stroke="#FF8A4C" stroke-width="1.5"/>
  <text x="402" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#FFB37E">sbom.ts · manifest.ts</text>
  <text x="402" y="108" text-anchor="middle" font-size="10.5" fill="#A1A1A8">file-manifest → SPDX-lite SBOM</text>
  <text x="402" y="125" text-anchor="middle" font-size="10.5" fill="#A1A1A8">每文件 sha256 · git 溯源 (SLSA-lite)</text>
  <text x="402" y="142" text-anchor="middle" font-size="10.5" fill="#A1A1A8">lockfile 派生 SBOM（MCP server）</text>

  <!-- sign -->
  <rect x="600" y="68" width="165" height="80" rx="15" fill="#FF6B6B" fill-opacity="0.16" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="682" y="100" text-anchor="middle" font-size="15" font-weight="600" fill="#FF9A9A">sign · Sigstore</text>
  <text x="682" y="122" text-anchor="middle" font-size="11" fill="#A1A1A8">keyless / ed25519 兜底</text>

  <!-- artifact handoff -->
  <line x1="682" y1="148" x2="682" y2="244" stroke="#3A3A44" stroke-width="1.5" stroke-dasharray="3 4" fill="none" marker-end="url(#ah-d)"/>
  <text x="700" y="200" font-size="10.5" fill="#A1A1A8">.attestload/attestation.json</text>

  <!-- ===== CONSUME lane: verify → policy/loader-guard → allowlist ===== -->
  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="290" y1="284" x2="385" y2="284" marker-end="url(#ah-d)"/>
  </g>

  <!-- verify -->
  <rect x="125" y="244" width="165" height="80" rx="15" fill="#FF6B6B" fill-opacity="0.16" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="207" y="276" text-anchor="middle" font-size="15" font-weight="600" fill="#FF9A9A">verify &lt;dir&gt;</text>
  <text x="207" y="298" text-anchor="middle" font-size="11" fill="#A1A1A8">重算摘要 + 校验签名</text>

  <!-- policy / loader-guard -->
  <rect x="385" y="244" width="195" height="80" rx="15" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.5"/>
  <text x="482" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#A9A6FF">policy · loader-guard</text>
  <text x="482" y="293" text-anchor="middle" font-size="10.5" fill="#A1A1A8">required / identities · pre-commit hook</text>
  <text x="482" y="309" text-anchor="middle" font-size="10.5" fill="#A1A1A8">Coding Agent 加载前调用</text>

  <!-- allowlist (cold-start feedback) -->
  <rect x="640" y="244" width="160" height="80" rx="15" fill="#FBBF24" fill-opacity="0.16" stroke="#FBBF24" stroke-width="1.5"/>
  <text x="720" y="276" text-anchor="middle" font-size="14" font-weight="600" fill="#FCD34D">index · allowlist</text>
  <text x="720" y="298" text-anchor="middle" font-size="11" fill="#A1A1A8">已验证 Skill 白名单 (冷启动)</text>

  <line x1="580" y1="270" x2="640" y2="270" stroke="#3A3A44" stroke-width="1.5" marker-end="url(#ah-d)" fill="none"/>

  <!-- verdict outputs -->
  <g stroke-width="2" fill="none">
    <line x1="482" y1="324" x2="408" y2="350" stroke="#FF6B6B" marker-end="url(#ah-block-d)"/>
    <line x1="482" y1="324" x2="556" y2="350" stroke="#2DC79A" marker-end="url(#ah-pass-d)"/>
  </g>
  <text x="372" y="354" text-anchor="end" font-size="12.5" font-weight="700" fill="#FF8585">BLOCKED · exit 1</text>
  <text x="566" y="354" font-size="12.5" font-weight="700" fill="#2DC79A">PASS · exit 0</text>
</svg>
