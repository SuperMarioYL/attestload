<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="AttestLoad — attest-before-load gate for coding agents">
  <defs>
    <linearGradient id="hd-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241412"/>
      <stop offset="1" stop-color="#1D1D1F"/>
    </linearGradient>
    <linearGradient id="hd-name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B6B"/>
      <stop offset="0.55" stop-color="#FF8A4C"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="hd-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8A4C"/>
      <stop offset="1" stop-color="#E04848"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="880" height="300" rx="20" fill="url(#hd-bg)"/>
  <rect x="0.5" y="0.5" width="879" height="299" rx="20" fill="none" stroke="#46322C" stroke-width="1"/>

  <!-- shield + check emblem -->
  <g transform="translate(92 150)">
    <circle r="58" fill="#FF6B6B" fill-opacity="0.10"/>
    <circle r="58" fill="none" stroke="#FF8A4C" stroke-opacity="0.30" stroke-width="1.5"/>
    <path d="M0,-40 L34,-27 L34,6 C34,28 18,40 0,46 C-18,40 -34,28 -34,6 L-34,-27 Z"
          fill="url(#hd-shield)"/>
    <path d="M-15,2 L-4,14 L17,-13" fill="none" stroke="#1D1D1F" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="184" y="128" font-size="58" font-weight="700" fill="url(#hd-name)" letter-spacing="-1.5">AttestLoad</text>
  <text x="186" y="166" font-size="20" font-weight="600" fill="#F5F5F7">为 Coding Agent 装上 attest-before-load 拒绝闸门</text>
  <text x="186" y="196" font-size="15" fill="#A1A1A8">给每个 Skill 与 MCP server 签发可验证 SBOM + 构建溯源 · 未签名代码一律拒绝加载</text>

  <!-- chips -->
  <g font-size="12.5" font-weight="600">
    <rect x="186" y="216" width="78" height="26" rx="13" fill="#FF6B6B" fill-opacity="0.16" stroke="#FF6B6B" stroke-opacity="0.40"/>
    <text x="225" y="233" text-anchor="middle" fill="#FF9A9A">Sigstore</text>
    <rect x="272" y="216" width="62" height="26" rx="13" fill="#FF8A4C" fill-opacity="0.16" stroke="#FF8A4C" stroke-opacity="0.40"/>
    <text x="303" y="233" text-anchor="middle" fill="#FFB37E">SBOM</text>
    <rect x="342" y="216" width="58" height="26" rx="13" fill="#FBBF24" fill-opacity="0.16" stroke="#FBBF24" stroke-opacity="0.40"/>
    <text x="371" y="233" text-anchor="middle" fill="#FCD34D">SLSA</text>
    <rect x="408" y="216" width="56" height="26" rx="13" fill="#FF6B6B" fill-opacity="0.16" stroke="#FF6B6B" stroke-opacity="0.40"/>
    <text x="436" y="233" text-anchor="middle" fill="#FF9A9A">MCP</text>
  </g>

  <!-- BLOCKED badge -->
  <g transform="translate(742 150)">
    <rect x="-78" y="-30" width="156" height="60" rx="14" fill="#FF6B6B" fill-opacity="0.16" stroke="#FF6B6B" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" font-size="19" font-weight="700" fill="#FF8585" letter-spacing="2">BLOCKED</text>
    <text x="0" y="17" text-anchor="middle" font-size="11.5" fill="#FFB37E">exit 1 · 拒绝加载</text>
  </g>
</svg>
